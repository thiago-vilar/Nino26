era5_single_levels:
  name: "ERA5 single levels"
  institution: "Copernicus Climate Change Service / ECMWF"
  source_url: "https://cds.climate.copernicus.eu/datasets/reanalysis-era5-single-levels"
  license: "Copernicus license; confirm at download time"
  version: null
  variables:
    - sea_level_pressure
    - surface_latent_heat_flux
    - surface_sensible_heat_flux
    - surface_net_solar_radiation
    - surface_net_thermal_radiation
    - 10m_u_component_of_wind
    - 10m_v_component_of_wind
    - total_column_water_vapour
  temporal_resolution: "hourly, aggregate to daily"
  spatial_resolution: "0.25 degree"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 7
  raw_path: "data/raw/era5"
  processed_path: "data/processed/zarr/era5/single_levels/<year>/<variable>/era5_single_<region>_<variable>_<year>_daily.zarr"
  notes: "Default annual mode requests one full year per region/variable, caches raw NetCDF, then aggregates 00/06/12/18 UTC values to daily Zarr. Use request_mode monthly-kind only as fallback. Active ERA5 regions: nino34 and brazil."

era5_pressure_levels:
  name: "ERA5 pressure levels"
  institution: "Copernicus Climate Change Service / ECMWF"
  source_url: "https://cds.climate.copernicus.eu/datasets/reanalysis-era5-pressure-levels"
  license: "Copernicus license; confirm at download time"
  version: null
  variables:
    - u_component_of_wind
    - v_component_of_wind
    - specific_humidity
    - geopotential
    - vertical_velocity
    - divergence
  pressure_levels_hpa: [850, 500, 200]
  temporal_resolution: "hourly, aggregate to daily"
  spatial_resolution: "0.25 degree"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 7
  raw_path: "data/raw/era5"
  processed_path: "data/processed/zarr/era5/pressure_levels/<year>/<variable>/era5_pressure_<region>_<variable>_<year>_daily.zarr"
  notes: "Default annual mode requests one full year per region/variable/all pressure levels, caches raw NetCDF, then aggregates 00/06/12/18 UTC values to daily Zarr. Use request_mode monthly-kind only as fallback. Active ERA5 regions: nino34 and brazil."

oras5:
  name: "ORAS5 ocean reanalysis"
  institution: "ECMWF / Copernicus"
  source_url: "https://cds.climate.copernicus.eu/datasets/reanalysis-oras5"
  license: "Copernicus license; confirm at download time"
  version: null
  variables:
    - potential_temperature
    - salinity
    - ocean_heat_content_for_the_upper_300m
    - ocean_heat_content_for_the_upper_700m
  temporal_resolution: "monthly source; align to daily model calendar as ocean memory features"
  spatial_resolution: "native ORAS5 grid"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 45
  raw_path: "data/raw/oras"
  processed_path: "data/processed/zarr/oras/<year>/<variable>/oras5_<variable>_<year>_daily.zarr"
  notes: "Default annual mode requests one full year per variable, caches raw ZIP/NetCDF, then aligns the monthly source to the daily model calendar as explicit ocean-memory features. Use monthly mode without annual_zarr only for open-year months or fallback. Daily OISST is the primary SST/SSTA source."

noaa_wod_ctd:
  name: "NOAA World Ocean Database CTD profiles"
  institution: "NOAA/NCEI"
  source_url: "https://www.ncei.noaa.gov/thredds-ocean/catalog/ncei/wod/catalog.html"
  license: "NOAA public data; cite product page"
  version: null
  variables:
    - lat
    - lon
    - time
    - date
    - wod_unique_cast
    - z
    - z_row_size
    - z_WODflag
    - Temperature
    - Temperature_row_size
    - Temperature_WODflag
    - Temperature_WODprofileflag
    - Salinity
    - Salinity_row_size
    - Salinity_WODflag
    - Salinity_WODprofileflag
  derived_variables:
    - pressure
    - absolute_salinity
    - conservative_temperature
    - sigma0
    - thermocline_depth
    - halocline_depth
    - pycnocline_depth
  temporal_resolution: "profile based"
  spatial_resolution: "station/profile based"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 365
  raw_path: "data/raw/ctd_noaa/wod"
  processed_path: "data/processed/zarr/ctd_noaa/wod"
  notes: "Annual WOD CTD NetCDF files are filtered to Nino 3.4, 5S-5N / 170W-120W, QC flag 0, interpolated to 0-300 m every 5 m for thermocline diagnostics, with salinity optional unless --require-salinity is used."

tao_triton_temperature:
  name: "TAO/TRITON daily subsurface temperature validation"
  institution: "NOAA PMEL / Global Tropical Moored Buoy Array"
  source_url: "https://data.pmel.noaa.gov/pmel/erddap/tabledap/pmelTaoDyT.html"
  license: "NOAA public data; acknowledge GTMBA Project Office"
  version: null
  variables:
    - array
    - station
    - wmo_platform_code
    - longitude
    - latitude
    - time
    - depth
    - T_20
    - QT_5020
    - ST_6020
  temporal_resolution: "daily"
  spatial_resolution: "moored point time series"
  period_start: "1977-11-03"
  period_end: "latest_available"
  latency_days: 3
  raw_path: "data/raw/tao_triton/temperature"
  processed_path: "data/processed/zarr/validation/tao_triton"
  notes: "Downloaded through PMEL ERDDAP for Nino 3.4, 5S-5N / 170W-120W, depth <=300 m, quality 1-3. Validation layer; not a replacement for ORAS5/OISST."

tao_triton_salinity:
  name: "TAO/TRITON daily subsurface salinity validation"
  institution: "NOAA PMEL / Global Tropical Moored Buoy Array"
  source_url: "https://data.pmel.noaa.gov/pmel/erddap/tabledap/pmelTaoDyS.html"
  license: "NOAA public data; acknowledge GTMBA Project Office"
  version: null
  variables:
    - array
    - station
    - wmo_platform_code
    - longitude
    - latitude
    - time
    - depth
    - S_41
    - QS_5041
    - SS_6041
  temporal_resolution: "daily"
  spatial_resolution: "moored point time series"
  period_start: "1987-10-14"
  period_end: "latest_available"
  latency_days: 3
  raw_path: "data/raw/tao_triton/salinity"
  processed_path: "data/processed/zarr/validation/tao_triton"
  notes: "Downloaded through PMEL ERDDAP for Nino 3.4, 5S-5N / 170W-120W, depth <=300 m, quality 1-3. Validation layer; salinity coverage is sparser than temperature."

argo_gdac_nino34:
  name: "Argo GDAC Nino 3.4 profile validation"
  institution: "International Argo Program / Ifremer ERDDAP"
  source_url: "https://erddap.ifremer.fr/erddap/tabledap/ArgoFloats.html"
  license: "Argo data policy; cite International Argo Program"
  version: null
  variables:
    - time
    - latitude
    - longitude
    - pres
    - temp
    - psal
    - pres_qc
    - temp_qc
    - psal_qc
    - data_mode
    - platform_number
  temporal_resolution: "profile based"
  spatial_resolution: "float profile tracks"
  period_start: "1999-01-01"
  period_end: "latest_available"
  latency_days: 3
  raw_path: "data/raw/argo"
  processed_path: "data/processed/zarr/validation/argo"
  notes: "Downloaded through Ifremer ERDDAP for Nino 3.4, 5S-5N / 170W-120W, pressure <=300 dbar. Validation layer strongest after the early 2000s."

noaa_oisst:
  name: "NOAA Optimum Interpolation SST v2.1"
  institution: "NOAA/NCEI"
  source_url: "https://www.ncei.noaa.gov/products/optimum-interpolation-sst"
  license: "NOAA public data; cite product page"
  version: "v2.1"
  variables:
    - sst
  temporal_resolution: "daily"
  spatial_resolution: "0.25 degree"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 7
  raw_path: "data/raw/cpc_noaa/oisst"
  processed_path: "data/processed/zarr/noaa_oisst.zarr"
  notes: "Primary daily SST/SSTA source. Project master period is 1981-latest available by source; record internal source gaps without silent filling."

noaa_olr:
  name: "NOAA interpolated OLR"
  institution: "NOAA Physical Sciences Laboratory"
  source_url: "https://psl.noaa.gov/data/gridded/data.interp_OLR.html"
  license: "NOAA public data; cite product page"
  version: null
  variables:
    - olr
  temporal_resolution: "daily"
  spatial_resolution: "2.5 degree"
  period_start: "1974-06-01"
  period_end: "latest_available"
  latency_days: 7
  raw_path: "data/raw/cpc_noaa/olr"
  processed_path: "data/processed/zarr/noaa_olr.zarr"
  notes: "Can be replaced by ERA5 radiation field for consistency tests."

