era5_single_levels:
  name: "ERA5 single levels"
  institution: "Copernicus Climate Change Service / ECMWF"
  source_url: "https://cds.climate.copernicus.eu/datasets/reanalysis-era5-single-levels"
  license: "Copernicus license; confirm at download time"
  version: null
  variables:
    - sea_level_pressure
    - surface_latent_heat_flux
    - surface_sensible_heat_flux
    - surface_net_solar_radiation
    - surface_net_thermal_radiation
    - 10m_u_component_of_wind
    - 10m_v_component_of_wind
    - total_column_water_vapour
  temporal_resolution: "hourly, aggregate to daily"
  spatial_resolution: "0.25 degree"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 7
  raw_path: "data/raw/era5"
  processed_path: "data/processed/zarr/era5/single_levels/<year>/era5_single_<region>_<yyyymm>.zarr"
  notes: "Use daily aggregation for the first MVP."

era5_pressure_levels:
  name: "ERA5 pressure levels"
  institution: "Copernicus Climate Change Service / ECMWF"
  source_url: "https://cds.climate.copernicus.eu/datasets/reanalysis-era5-pressure-levels"
  license: "Copernicus license; confirm at download time"
  version: null
  variables:
    - u_component_of_wind
    - v_component_of_wind
    - specific_humidity
    - geopotential
    - vertical_velocity
    - divergence
  pressure_levels_hpa: [850, 500, 200]
  temporal_resolution: "hourly, aggregate to daily"
  spatial_resolution: "0.25 degree"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 7
  raw_path: "data/raw/era5"
  processed_path: "data/processed/zarr/era5/pressure_levels/<year>/era5_pressure_<region>_<yyyymm>.zarr"
  notes: "Variables are used for the Pacific-Brazil atmospheric bridge."

oras5:
  name: "ORAS5 ocean reanalysis"
  institution: "ECMWF / Copernicus"
  source_url: "https://cds.climate.copernicus.eu/datasets/reanalysis-oras5"
  license: "Copernicus license; confirm at download time"
  version: null
  variables:
    - potential_temperature
    - salinity
    - ocean_heat_content_for_the_upper_300m
    - ocean_heat_content_for_the_upper_700m
  temporal_resolution: "monthly source; align to daily model calendar as ocean memory features"
  spatial_resolution: "native ORAS5 grid"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 45
  raw_path: "data/raw/oras"
  processed_path: "data/processed/zarr/oras/<year>/oras5_<yyyymm>.zarr"
  notes: "Use ORAS5 for subsurface memory features. Daily OISST is the primary SST/SSTA source."

noaa_wod_ctd:
  name: "NOAA World Ocean Database CTD profiles"
  institution: "NOAA/NCEI"
  source_url: "https://www.ncei.noaa.gov/thredds-ocean/catalog/ncei/wod/catalog.html"
  license: "NOAA public data; cite product page"
  version: null
  variables:
    - lat
    - lon
    - time
    - date
    - wod_unique_cast
    - z
    - z_row_size
    - z_WODflag
    - Temperature
    - Temperature_row_size
    - Temperature_WODflag
    - Temperature_WODprofileflag
    - Salinity
    - Salinity_row_size
    - Salinity_WODflag
    - Salinity_WODprofileflag
  derived_variables:
    - pressure
    - absolute_salinity
    - conservative_temperature
    - sigma0
    - thermocline_depth
    - halocline_depth
    - pycnocline_depth
  temporal_resolution: "profile based"
  spatial_resolution: "station/profile based"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 365
  raw_path: "data/raw/ctd_noaa/wod"
  processed_path: "data/processed/zarr/ctd_noaa/wod"
  notes: "Annual WOD CTD NetCDF files are filtered to Pacific 35S-30N / 120E-70W, QC flag 0, interpolated to 0-700 m every 5 m, processed with TEOS-10 and saved as annual Zarr."

noaa_oisst:
  name: "NOAA Optimum Interpolation SST v2.1"
  institution: "NOAA/NCEI"
  source_url: "https://www.ncei.noaa.gov/products/optimum-interpolation-sst"
  license: "NOAA public data; cite product page"
  version: "v2.1"
  variables:
    - sst
  temporal_resolution: "daily"
  spatial_resolution: "0.25 degree"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 7
  raw_path: "data/raw/cpc_noaa/oisst"
  processed_path: "data/processed/zarr/noaa_oisst.zarr"
  notes: "Primary daily SST/SSTA source. Project master period is 1981-latest available by source; record internal source gaps without silent filling."

noaa_olr:
  name: "NOAA interpolated OLR"
  institution: "NOAA Physical Sciences Laboratory"
  source_url: "https://psl.noaa.gov/data/gridded/data.interp_OLR.html"
  license: "NOAA public data; cite product page"
  version: null
  variables:
    - olr
  temporal_resolution: "daily"
  spatial_resolution: "2.5 degree"
  period_start: "1974-06-01"
  period_end: "latest_available"
  latency_days: 7
  raw_path: "data/raw/cpc_noaa/olr"
  processed_path: "data/processed/zarr/noaa_olr.zarr"
  notes: "Can be replaced by ERA5 radiation field for consistency tests."

chirps_precipitation_p25:
  name: "CHIRPS daily precipitation 0.25 degree"
  institution: "Climate Hazards Center / UC Santa Barbara"
  source_url: "https://data.chc.ucsb.edu/products/CHIRPS-2.0/global_daily/netcdf/p25/"
  license: "CHIRPS terms; cite product page"
  version: "2.0"
  variables:
    - precip
  temporal_resolution: "daily"
  spatial_resolution: "0.25 degree"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 45
  raw_path: "data/raw/chirps/p25"
  processed_path: "data/processed/zarr/brazil_precipitation"
  notes: "Phase 1 precipitation target aligned to the 0.25 degree modeling grid; crop to IBGE Brazil mask during ETL."

chirps_precipitation_p05_phase2:
  name: "CHIRPS daily precipitation 0.05 degree"
  institution: "Climate Hazards Center / UC Santa Barbara"
  source_url: "https://data.chc.ucsb.edu/products/CHIRPS-2.0/global_daily/netcdf/p05/"
  license: "CHIRPS terms; cite product page"
  version: "2.0"
  variables:
    - precip
  temporal_resolution: "daily"
  spatial_resolution: "0.05 degree"
  period_start: "1981-01-01"
  period_end: "latest_available"
  latency_days: 45
  raw_path: "data/raw/chirps/p05"
  processed_path: "data/processed/zarr/brazil_precipitation_p05"
  notes: "Phase 2 high-resolution target for pixel-level final products after MVP validation."

ibge_boundaries:
  name: "IBGE territorial boundaries"
  institution: "Instituto Brasileiro de Geografia e Estatistica"
  source_url: "https://www.ibge.gov.br/geociencias/organizacao-do-territorio/malhas-territoriais.html"
  license: "Confirm terms on IBGE download page"
  version: null
  variables:
    - national_boundary
    - state_boundaries
    - regional_boundaries
  temporal_resolution: "static"
  spatial_resolution: "cartographic vector"
  period_start: null
  period_end: null
  raw_path: "data/raw/ibge"
  processed_path: "data/processed/geotiff/ibge"
  notes: "Use for Brazil mask, regional aggregation and choropleth maps; not a climate predictor."
